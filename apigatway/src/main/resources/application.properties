spring.application.name=api-gateway

# Gateway Routes
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=userservice-public
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/users/public/**

spring.cloud.gateway.server.webflux.routes[2].id=userservice-protected
spring.cloud.gateway.server.webflux.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=JwtAuthentication


server.port=8080

jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentEnvironmentOnly}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true