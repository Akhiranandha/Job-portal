spring.application.name=api-gateway

# Gateway Routes
# Order matters: more specific paths (auth-password) must come before /auth/**.
spring.cloud.gateway.server.webflux.routes[0].id=auth-password
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/password
spring.cloud.gateway.server.webflux.routes[0].filters[0]=JwtAuthentication

spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[2].id=userservice-public
spring.cloud.gateway.server.webflux.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/users/public/**

spring.cloud.gateway.server.webflux.routes[3].id=userservice-protected
spring.cloud.gateway.server.webflux.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=JwtAuthentication


server.port=8080

jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentEnvironmentOnly}

# CORS — comma-separated list of allowed frontend origins.
# Defaults cover Vite (5173) and Next.js (3000) in dev. Tighten before prod.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true