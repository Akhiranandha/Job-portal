# =========================
# SERVER CONFIG
# =========================
server.port=8082

# =========================
# APPLICATION NAME
# =========================
spring.application.name=auth-service

# =========================
# DATABASE CONFIG
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Kodam@624
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# EUREKA CLIENT CONFIG
# =========================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# =========================
# OPTIONAL (GOOD FOR DEBUGGING)
# =========================
logging.level.org.springframework=INFO
logging.level.com.netflix.eureka=OFF
logging.level.com.netflix.discovery=OFF

# =========================
# JWT CONFIG
# =========================
jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentEnvironmentOnly}
jwt.expiration=86400000

# =========================
# KAFKA CONFIG
# =========================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Consumer
spring.kafka.consumer.group-id=auth-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.trusted.packages=com.jobportal.kafka_events

# Producer (used by DeadLetterPublishingRecoverer to forward poison records to <topic>.DLT)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

# Topics
kafka.topic.user-registration=user-registration
kafka.topic.delete-user=delete-user