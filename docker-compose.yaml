services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # We define two listeners:
      # 1. INTERNAL (29092) for communication between containers
      # 2. EXTERNAL (9092) for your Windows/Host machine
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to start...'
      sleep 15
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic user-registration --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1
      echo 'Topic user-registration created successfully'
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic delete-user --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1
      echo 'Topic delete-user created successfully'
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic profile-updated --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1
      echo 'Topic profile-updated created successfully'
      "
